<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your IT Company</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Your IT Company</h1>
    <p>We build reliable software and data solutions.</p>

    <section class="card">
      <h2>What we do</h2>
      <h3>Chat with us</h3>

<div id="chatBox" style="border:1px solid #ccc; padding:10px; height:220px; overflow:auto; margin-bottom:10px;"></div>

<input id="userInput" placeholder="Ask something..." style="width:70%; padding:8px;" />
<button id="sendBtn" style="padding:8px;">Send</button>

<script>
  document.getElementById("sendBtn").addEventListener("click", sendMessage);

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");
    const message = input.value.trim();
    if (!message) return;

    chatBox.innerHTML += `<div><b>You:</b> ${message}</div>`;
    input.value = "";

    // TEMP (local backend for now)
    const res = await fetch("http://127.0.0.1:8000/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    chatBox.innerHTML += `<div><b>AI:</b> ${data.reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
      <ul>
        <li>Web Applications</li>
        <li>API Integrations</li>
        <li>Cloud & DevOps</li>
      </ul>
    </section>

    <footer class="footer">
      <p>Contact: yourname@email.com</p>
    </footer>
  </main>
</body>
</html>
